<script>

</script>

<body>

<header>
    <div class="menu-btn" onclick="toggleDropdown()">
        <i class="fa-solid fa-ellipsis-vertical"></i>
        
        <div class="dropdown-menu" id="myDropdown">
            <a href="https://www.hisn.org.sa/" target="_blank" class="association-card">

                </div>

                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </a>
        </div>
    </div>

    <div class="logo-area">
        <img src="logo.png.png" alt="Hisn Association Logo">
        <div class="logo-text">جمعية حصن لخدمة ضيوف الرحمن</div>
    </div>
</header>

    <section class="hero-section">
        <p class="sub-title">إحدى مبادرات جمعية حصن</p>
        <h1>غار حراء.. مهد الوحي ومبتدأ الرسالة</h1>

    <section class="lang-list">
        <a href="ar.html" class="lang-box"><img src="ar-btn.png.png" alt="العربية"></a>
        <a href="en.html" class="lang-box"><img src="en-btn.png.png" alt="English"></a>

    <footer>
        <div class="footer-container">
            <div class="footer-right">
                <div class="contact-item">
                    <span>+966564500335</span>
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="contact-item">
                    <span>@jm_hisn</span>
                    <i class="fa-brands fa-x-twitter"></i>
                </div>
            </div>

            <div class="footer-left">

                <p>الحاج والمعتمر والزائر</p>
            </div>
        </div>
    </footer>
<script>
function toggleDropdown() {
    document.getElementById("myDropdown").classList.toggle("show");
}

window.onclick = function(event) {
    if (!event.target.matches('.menu-btn') && !event.target.matches('.menu-btn *')) {
        var dropdowns = document.getElementsByClassName("dropdown-menu");
        for (var i = 0; i < dropdowns.length; i++) {
            var openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) {
                openDropdown.classList.remove('show');
            }
        }
    }
}
</script>
